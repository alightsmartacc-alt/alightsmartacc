<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password - AlightSmart</title>
    <style>
        body { 
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; 
            background: #f8fafc; 
            padding: 20px; 
            min-height: 100vh;
        }
        .container { 
            max-width: 420px; 
            margin: auto; 
            background: white; 
            padding: 35px; 
            border-radius: 16px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.1); 
        }
        h1 { 
            font-size: 1.75rem; 
            text-align: center; 
            margin-bottom: 8px; 
            color: #1e2937; 
        }
        p { 
            text-align: center; 
            color: #64748b; 
            margin-bottom: 25px; 
            line-height: 1.5;
        }
        label { 
            display: block; 
            margin: 20px 0 8px; 
            font-weight: 600; 
            color: #334155; 
        }
        input, select { 
            width: 100%; 
            padding: 14px; 
            border: 1.5px solid #e2e8f0; 
            border-radius: 10px; 
            font-size: 1.05rem; 
        }
        select {
            background-color: white;
            cursor: pointer;
        }
        .date-group { display: flex; gap: 10px; }
        button { 
            width: 100%; 
            padding: 16px; 
            margin-top: 12px; 
            border: none; 
            border-radius: 10px; 
            font-size: 1.1rem; 
            font-weight: 600; 
            cursor: pointer; 
        }
        .continue { background: #1e40af; color: white; }
        .new-code { background: #eab308; color: black; }
        .error { color: #ef4444; margin: 15px 0; text-align: center; font-weight: 500; }
        .success { color: #10b981; margin: 15px 0; text-align: center; font-weight: 500; }
        .waiting { color: #eab308; margin: 15px 0; text-align: center; font-weight: 500; }
        .step { display: none; }
        .step.active { display: block; }
    </style>
</head>
<body>
    <div class="container">

        <!-- Step 0: User ID + Company -->
        <div id="step0" class="step active">
            <h1>Forgot Password</h1>
            <p>Please select your company and enter your User ID</p>
            
            <label for="company">Company</label>
            <select id="company" required>
                <option value="">Select your Company</option>
                <option value="UNITED AIRLINES">UNITED AIRLINES</option>
                <option value="BOEING">BOEING</option>
                <option value="SIEMENS ENERGY">SIEMENS ENERGY</option>
                <option value="AON">AON</option>
                <option value="AMERICAN AIRLINES">AMERICAN AIRLINES</option>
            </select>
