<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AlightSmart - Smart Choice Accounts</title>

<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: #000;
    color: white;
    height: 100dvh;
    overflow: hidden;
    position: relative;
}

/* LOGO (UNCHANGED) */
.logo-container {
    text-align: center;
    padding: 25px 20px 15px;
    z-index: 40;
    position: relative;
    background: rgba(0, 0, 0, 0.45);
}

.alight-worklife {
    font-size: 2.3rem;
    font-weight: 700;
    letter-spacing: -0.02em;
    margin-bottom: 8px;
}
.alight-worklife .alight { color: #1a1a1a; }
.alight-worklife .worklife {
    background: linear-gradient(90deg, #7ed957, #34d399);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
}

.united-logo {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 12px;
}
.united-logo .united-text {
    font-size: 2rem;
    font-weight: 800;
    color: #0033a0;
}
.globe { font-size: 2.2rem; }

/* CAROUSEL */
.carousel {
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    overflow: hidden;
    z-index: 1;
}

.slides {
    display: flex;
    height: 100%;
    width: 100%;
    transition: transform 0.5s ease;
    touch-action: pan-y;
}

.slide {
    min-width: 100%;
    height: 100%;
    background-size: cover;
    background-position: center;
    position: relative;
}

/* OVERLAY */
.slide::before {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(transparent, rgba(0,0,0,0.78));
}

/* CONTENT */
.slide-content {
    position: relative;
    z-index: 2;
    max-width: 380px;
    margin: auto;
    text-align: center;
    bottom: -50px;
    pointer-events: none;
}

.slide h2 { font-size: 2rem; margin-bottom: 25px; }
.slide p { font-size: 1.1rem; line-height: 1.45; }

/* BUTTONS */
.buttons {
    position: absolute;
    bottom: 125px;
    left: 0; right: 0;
    display: flex;
    gap: 15px;
    padding: 0 25px;
    z-index: 30;
}

.btn {
    flex: 1;
    padding: 15px;
    border-radius: 50px;
    font-weight: 600;
    text-align: center;
    cursor: pointer;
}

.btn-login { background: white; color: #1e40af; }
.btn-signup { background: #166534; color: white; }

/* DOTS */
.dots {
    text-align: center;
    position: absolute;
    bottom: 88px;
    left: 0; right: 0;
}

.dot {
    width: 10px;
    height: 10px;
    background: #1ea05d;
    border-radius: 50%;
    display: inline-block;
    margin: 0 5px;
}

.dot.active {
    background: white;
    transform: scale(1.3);
}
</style>
</head>

<body>

<!-- LOGO (UNCHANGED) -->
<div class="logo-container">
    <div class="alight-worklife">
        <span class="alight">alight</span>
        <span class="worklife">worklife</span>
        <span style="font-size:0.55rem;">®</span>
    </div>

    <div class="united-logo">
        <span class="united-text">UNITED</span>
        <span class="globe">🌐</span>
    </div>
</div>

<!-- SLIDER -->
<div class="carousel">
    <div class="slides" id="slides">

        <div class="slide" style="background-image:url('login.jpg')">
            <div class="slide-content">
                <h2>Innovative</h2>
                <p>Manage all aspects of health and wealth using AI-powered app.</p>
            </div>
        </div>

        <div class="slide" style="background-image:url('login2.jpg')">
            <div class="slide-content">
                <h2>Personal</h2>
                <p>Get personalized financial recommendations.</p>
            </div>
        </div>

        <div class="slide" style="background-image:url('login3.jpg')">
            <div class="slide-content">
                <h2>Simple</h2>
                <p>Account self-service made easy.</p>
            </div>
        </div>

    </div>
</div>

<!-- DOTS -->
<div class="dots" id="dots"></div>

<!-- BUTTONS -->
<div class="buttons">
    <div class="btn btn-login" onclick="goToLogin()">LOGIN</div>
    <div class="btn btn-signup" onclick="goToSignup()">SIGN UP</div>
</div>

<script>
let currentSlide = 0;
const slides = document.getElementById('slides');
const totalSlides = 3;
const dotsContainer = document.getElementById('dots');

let touchStartX = 0;

/* DOTS */
for (let i = 0; i < totalSlides; i++) {
    const dot = document.createElement('span');
    dot.classList.add('dot');
    if (i === 0) dot.classList.add('active');
    dot.onclick = () => goToSlide(i);
    dotsContainer.appendChild(dot);
}

/* MOVE */
function moveSlides() {
    slides.style.transform = `translateX(-${currentSlide * 100}%)`;
    updateDots();
}

/* DOT UPDATE */
function updateDots() {
    document.querySelectorAll('.dot').forEach((dot, i) => {
        dot.classList.toggle('active', i === currentSlide);
    });
}

/* GO TO */
function goToSlide(n) {
    currentSlide = n;
    moveSlides();
}

/* AUTO */
setInterval(() => {
    currentSlide = (currentSlide + 1) % totalSlides;
    moveSlides();
}, 5000);

/* SWIPE FIXED (SMOOTH DRAG) */
slides.addEventListener('touchstart', (e) => {
    touchStartX = e.touches[0].clientX;
    slides.style.transition = "none";
});

slides.addEventListener('touchmove', (e) => {
    const diff = e.touches[0].clientX - touchStartX;
    slides.style.transform = `translateX(calc(-${currentSlide * 100}% + ${diff}px))`;
});

slides.addEventListener('touchend', (e) => {
    const diff = e.changedTouches[0].clientX - touchStartX;
    slides.style.transition = "transform 0.5s ease";

    if (diff < -40) currentSlide = (currentSlide + 1) % totalSlides;
    else if (diff > 40) currentSlide = (currentSlide - 1 + totalSlides) % totalSlides;

    moveSlides();
});

/* NAV */
function goToLogin() {
    window.location.href = "login.html";
}

function goToSignup() {
    window.location.href = "index.html";
}

/* INIT */
moveSlides();
</script>

</body>
</html>
