<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AlightSmart - Smart Choice Accounts</title>

<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: #000;
    color: white;
    height: 100dvh;
    overflow: hidden;
}

/* LOGO */
.logo-container {
    text-align: center;
    padding: 25px 20px 15px;
    z-index: 40;
    position: relative;
    background: rgba(0,0,0,0.45);
}

/* CAROUSEL */
.carousel {
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    overflow: hidden;
}

.slides {
    display: flex;
    height: 100%;
    width: 100%;
    transition: transform 0.5s ease;
    touch-action: pan-y;
}

.slide {
    min-width: 100%;
    height: 100%;
    background-size: cover;
    background-position: center;
    position: relative;
}

/* DARK OVERLAY */
.slide::before {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(transparent, rgba(0,0,0,0.78));
}

/* TEXT */
.slide-content {
    position: absolute;
    left: 50%;
    bottom: 140px;
    transform: translateX(-50%);
    max-width: 380px;
    text-align: center;

    transition: transform 0.6s ease,
                opacity 0.6s ease,
                filter 0.6s ease;

    pointer-events: none;
}

/* TEXT STYLE */
.slide h2 { font-size: 2rem; margin-bottom: 20px; font-weight: 700; }
.slide p { font-size: 1.1rem; line-height: 1.4; font-weight: 500; }

/* DOTS */
.dots {
    position: absolute;
    bottom: 120px;
    left: 0; right: 0;
    text-align: center;
}

.dot {
    width: 10px;
    height: 10px;
    background: #1ea05d;
    border-radius: 50%;
    display: inline-block;
    margin: 0 5px;
}

.dot.active {
    background: white;
    transform: scale(1.3);
}

/* BUTTONS */
.buttons {
    position: absolute;
    bottom: 50px;
    left: 0; right: 0;
    display: flex;
    gap: 15px;
    padding: 0 25px;
}

.btn {
    flex: 1;
    padding: 15px;
    border-radius: 50px;
    text-align: center;
    font-weight: 600;
    cursor: pointer;
}

.btn-login { background: white; color: #000; }
.btn-signup { background: #166534; color: white; }

</style>
</head>

<body>

<div class="logo-container">
    <h2>AlightSmart</h2>
</div>

<div class="carousel">
    <div class="slides" id="slides">

        <div class="slide" style="background-image:url('login.jpg')">
            <div class="slide-content">
                <h2>Innovative</h2>
                <p>Manage all aspects of health and wealth using AI-powered tools.</p>
            </div>
        </div>

        <div class="slide" style="background-image:url('login2.jpg')">
            <div class="slide-content">
                <h2>Personal</h2>
                <p>Get personalized insights to improve your financial life.</p>
            </div>
        </div>

        <div class="slide" style="background-image:url('login3.jpg')">
            <div class="slide-content">
                <h2>Simple</h2>
                <p>Easy self-service account management.</p>
            </div>
        </div>

    </div>
</div>

<div class="dots" id="dots"></div>

<div class="buttons">
    <div class="btn btn-login" onclick="goToLogin()">LOGIN</div>
    <div class="btn btn-signup" onclick="goToSignup()">SIGN UP</div>
</div>

<script>
let currentSlide = 0;
const slides = document.getElementById('slides');
const totalSlides = 3;
const dotsContainer = document.getElementById('dots');

let touchStartX = 0;

/* DOTS */
for (let i = 0; i < totalSlides; i++) {
    const dot = document.createElement('span');
    dot.classList.add('dot');
    if (i === 0) dot.classList.add('active');
    dot.onclick = () => goToSlide(i);
    dotsContainer.appendChild(dot);
}

/* MOVE SLIDES */
function moveSlides() {
    slides.style.transform = `translateX(-${currentSlide * 100}%)`;

    const allContent = document.querySelectorAll('.slide-content');

    allContent.forEach((content, i) => {
        const offset = i - currentSlide;

        const x = offset * 50;
        const y = offset * 20;

        const scale = i === currentSlide ? 1 : 0.85;
        const opacity = i === currentSlide ? 1 : 0.4;
        const blur = i === currentSlide ? 0 : 3;

        content.style.transform = `translate(${x}px, ${y}px) scale(${scale})`;
        content.style.opacity = opacity;
        content.style.filter = `blur(${blur}px)`;
    });

    updateDots();
}

/* DOT UPDATE */
function updateDots() {
    document.querySelectorAll('.dot').forEach((dot, i) => {
        dot.classList.toggle('active', i === currentSlide);
    });
}

/* GO TO SLIDE */
function goToSlide(n) {
    currentSlide = n;
    moveSlides();
}

/* AUTO SLIDE */
setInterval(() => {
    currentSlide = (currentSlide + 1) % totalSlides;
    moveSlides();
}, 5000);

/* SWIPE FIXED */
slides.addEventListener('touchstart', (e) => {
    touchStartX = e.touches[0].clientX;
    slides.style.transition = "none";
});

slides.addEventListener('touchend', (e) => {
    const diff = e.changedTouches[0].clientX - touchStartX;
    slides.style.transition = "transform 0.5s ease";

    if (diff < -40) currentSlide = (currentSlide + 1) % totalSlides;
    else if (diff > 40) currentSlide = (currentSlide - 1 + totalSlides) % totalSlides;

    moveSlides();
});

/* NAV */
function goToLogin() {
    window.location.href = "login.html";
}

function goToSignup() {
    window.location.href = "index.html";
}

/* INIT */
moveSlides();
</script>

</body>
</html>
